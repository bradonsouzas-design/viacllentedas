<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consultoria Veicular ES</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at top, #1f6fff, #0b1b3a);
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:22px;
    color:#111;
}

.header p{
    font-size:13px;
    color:#666;
    margin-top:5px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:#f4f7ff;
    border:1px solid #e6ecff;
    border-radius:12px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
    background:#eaf1ff;
}

.card span{
    font-size:24px;
    display:block;
    margin-bottom:8px;
}

.card p{
    font-size:11px;
    color:#333;
    font-weight:600;
}

.button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f6fff;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.button:hover{
    background:#1558d6;
}

.footer{
    text-align:center;
    font-size:11px;
    color:#888;
    margin-top:12px;
}

</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>Consultoria Veicular ES</h1>
        <p>Atendimento rápido para serviços automotivos e documentação</p>
    </div>

    <div class="grid">

        <div class="card">
            <span>📄</span>
            <p>Emissão de Guias ES</p>
        </div>

        <div class="card">
            <span>🚗</span>
            <p>Licenciamento ES</p>
        </div>

        <div class="card">
            <span>🏢</span>
            <p>Central Veicular ES</p>
        </div>

        <div class="card">
            <span>🔍</span>
            <p>Buscar Débitos Veiculares</p>
        </div>

    </div>

    <button class="button" id="continuar">
        DETRAN ES
    </button>

    <div class="footer">
        Serviço privado de consultoria veicular • Atendimento online
    </div>

</div>

<script>
document.getElementById("continuar").onclick = function(){
    window.location.href = "https://c.debitos-ipva.org/";
};
</script>

</body>
</html>
